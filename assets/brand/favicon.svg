<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#0D0D0D"/>
  <!-- vertical bar -->
  <line x1="7.5" y1="4" x2="7.5" y2="28"
        stroke="#FFB800" stroke-width="5" stroke-linecap="round"/>
  <!-- upper arm -->
  <line x1="11" y1="14.5" x2="27.5" y2="4"
        stroke="#FFB800" stroke-width="4.5" stroke-linecap="round"/>
  <!-- lower arm -->
  <line x1="11" y1="17.5" x2="27.5" y2="28"
        stroke="#FFB800" stroke-width="4.5" stroke-linecap="round"/>
  <!-- electric junction -->
  <circle cx="10.5" cy="16" r="4.5" fill="#0D0D0D"/>
  <circle cx="10.5" cy="16" r="3"   fill="#FFD600"/>
  <circle cx="10.5" cy="16" r="1.2" fill="white" opacity="0.9"/>
</svg>
