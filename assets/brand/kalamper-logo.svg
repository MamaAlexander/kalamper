<svg viewBox="0 0 240 52" xmlns="http://www.w3.org/2000/svg">
  <!-- Black plate — like the battery label -->
  <rect width="240" height="52" rx="7" fill="#111111"/>
  <!-- Yellow diagonal accent (right side, like label chevron) -->
  <clipPath id="lcp"><rect width="240" height="52" rx="7"/></clipPath>
  <g clip-path="url(#lcp)" opacity="0.18">
    <polygon points="206,0 240,0 240,52 218,52" fill="#FFB800"/>
    <polygon points="214,0 226,0 226,52 210,52" fill="#FFB800"/>
  </g>
  <!-- KALAMPER bold text -->
  <text x="14" y="35"
    font-family="'Arial Black','Arial',Helvetica,sans-serif"
    font-weight="900"
    font-size="27"
    letter-spacing="3.5"
    fill="white">KALAMPER</text>
  <!-- Subtitle bar -->
  <text x="15" y="47"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="400"
    font-size="7"
    letter-spacing="3"
    fill="#FFB800">СТАРТЕРНЫЕ АККУМУЛЯТОРЫ</text>
</svg>
